[tox]
envlist = py314-django51-bulma, py314-django51-bootstrap
minversion = 4.0
isolated_build = true

# To run: `tox` (both environments) or `tox -e py314-django51-bulma`
# Requires editable install of both frontends: pip install -e ".[bulma,bootstrap,dev]"
# tests/settings.py (and djcrud_example/settings.py) now uses os.getenv('DJCRUD_FRONTEND', 'djcrud_bulma')
# to include *only* the selected frontend in INSTALLED_APPS.

[testenv]
package = wheel
wheel_build_env = .pkg
deps =
    Django>=5.1
    pytest
    pytest-django
    pytest-cov
    # crispy-bootstrap5 is only needed for bootstrap env (added in specific testenv below)
commands =
    # DJCRUD_FRONTEND env var (set per-env below) selects which frontend to include
    # in INSTALLED_APPS (via os.getenv in tests/settings.py) and which config to apply.
    pytest -n auto --django-settings=tests.settings -q --tb=no
setenv =
    DJANGO_SETTINGS_MODULE = tests.settings
    PYTHONPATH = {toxinidir}/src
    bulma: DJCRUD_FRONTEND = djcrud_bulma
    bootstrap: DJCRUD_FRONTEND = djcrud_bootstrap

[testenv:py314-django51-bulma]
deps =
    Django>=5.1
    pytest
    pytest-django
    pytest-cov
    pytest-xdist
    crispy-bulma
setenv =
    DJANGO_SETTINGS_MODULE = tests.settings
    PYTHONPATH = {toxinidir}/src
    DJCRUD_FRONTEND = djcrud_bulma
commands = pytest -q --tb=no

[testenv:py314-django51-bootstrap]
deps =
    Django>=5.1
    pytest
    pytest-django
    pytest-cov
    crispy-bootstrap5
    crispy-bulma  # provides bulma templates for tests (no local overrides)
setenv =
    DJANGO_SETTINGS_MODULE = tests.settings
    PYTHONPATH = {toxinidir}/src
    DJCRUD_FRONTEND = djcrud_bootstrap
commands = pytest -q --tb=no

[gh-actions]
python =
    3.14: py314
