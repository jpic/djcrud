{% extends "djcrud/base.html" %}
{% load crispy_forms_tags %}

{% partialdef content %}
<div class="card" up-main="modal">
    <div class="card-header bg-warning text-dark">
        <h2 class="card-title mb-0">
            {% if view.icon %}<i class="bi bi-{{ view.icon }}"></i>{% endif %}
            {{ view.title }}
        </h2>
    </div>
    <div class="card-body">
        <div class="alert alert-info">
            <i class="bi bi-question-circle"></i>
            Are you sure you want to log out?
        </div>

        <form method="post" up-target="body" up-history="false">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="d-flex justify-content-end gap-2 mt-3">
                <button type="button" class="btn btn-secondary" up-dismiss>Cancel</button>
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </form>
    </div>
</div>
{% endpartialdef %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        {% partial content %}
    </div>
</div>
{% endblock %}
