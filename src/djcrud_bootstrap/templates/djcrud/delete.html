{% extends "djcrud/confirm.html" %}
{% load crispy_forms_tags %}

<div class="card" up-main="modal">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h2 class="card-title mb-0">
            {% if view.icon %}<i class="bi bi-{{ view.icon }}{% if view.color %} text-{{ view.color }}{% endif %}"></i>{% endif %}
            {{ view.title }}
        </h2>
    </div>
    <div class="card-body">
        <div class="alert alert-warning">
            <i class="bi bi-exclamation-triangle"></i>
            Are you sure you want to delete <strong>{{ object }}</strong>?
            This action cannot be undone.
        </div>

        <form method="post" up-submit up-target="[up-main]" up-layer="root">
            {% csrf_token %}

            <div class="d-flex justify-content-end gap-2 mt-3">
                {% if view.cancel_url %}
                <button type="button" class="btn btn-secondary" up-dismiss>Cancel</button>
                {% endif %}
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i> Delete
                </button>
            </div>
        </form>
    </div>
</div>
