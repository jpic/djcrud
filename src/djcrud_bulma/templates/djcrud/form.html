{% extends "djcrud/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="columns is-centered">
    <div class="column is-8-tablet is-6-desktop">
        <div class="box" up-main="modal">
            <div class="level mb-4">
                <div class="level-left">
                    <h2 class="title is-4">{{ view.title }}</h2>
                </div>
                <div class="level-right">
                    {% block title_actions %}{% endblock %}
                </div>
            </div>
            <form method="post"
                  up-submit
                  {% if view.up_target %}up-layer="{{ view.up_target }}" up-target="[up-main]"{% endif %}
                  {% if form.is_multipart %}enctype="multipart/form-data"{% endif %}>
                {% csrf_token %}
                {{ form|crispy }}

                <div class="field is-grouped is-grouped-right mt-4">
                    {% if view.cancel_url %}
                    <p class="control">
                        <button type="button" class="button" up-dismiss>Cancel</button>
                    </p>
                    {% endif %}
                    <p class="control">
                        <button type="submit" class="button is-primary">Save</button>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
